<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilience Research Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
        <header class="mb-8">
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Resilience Tracker</h1>
            <p class="text-slate-500 text-sm italic">Equation: R = θ·D·(αA+βN+γM)·S·O/E</p>
        </header>

        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">Biological (A)</label>
                <input type="range" id="A" min="1" max="10" value="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">Social (N)</label>
                <input type="range" id="N" min="1" max="10" value="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">Strategic (M)</label>
                <input type="range" id="M" min="1" max="10" value="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">Effort (E)</label>
                <input type="number" id="E" value="1" class="w-full mt-1 border border-slate-300 p-2 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            
            <button onclick="calculate()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-indigo-600 transition-all shadow-lg active:scale-95">
                Calculate & Save to DB
            </button>
        </div>

        <div id="resultBox" class="mt-8 p-6 rounded-2xl text-center hidden transition-all border">
            <span class="text-xs font-bold uppercase tracking-widest opacity-60">Calculated Score</span>
            <div id="scoreDisplay" class="text-5xl font-black my-1">0.00</div>
            <div id="phaseDisplay" class="text-sm font-bold uppercase tracking-tighter italic"></div>
        </div>
    </div>

    <script>
        async function calculate() {
            const btn = event.target;
            btn.innerText = "Saving...";
            
            const payload = {
                A: parseFloat(document.getElementById('A').value),
                N: parseFloat(document.getElementById('N').value),
                M: parseFloat(document.getElementById('M').value),
                E: parseFloat(document.getElementById('E').value)
            };

            try {
                const response = await fetch('/calculate-resilience', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const res = await response.json();

                const box = document.getElementById('resultBox');
                const pDisplay = document.getElementById('phaseDisplay');
                box.classList.remove('hidden');
                
                // Dynamic styling based on Phase
                if(res.phase === "Foundation") {
                    box.className = "mt-8 p-6 rounded-2xl text-center bg-orange-50 border-orange-200 text-orange-700";
                } else if(res.phase === "Growth") {
                    box.className = "mt-8 p-6 rounded-2xl text-center bg-blue-50 border-blue-200 text-blue-700";
                } else {
                    box.className = "mt-8 p-6 rounded-2xl text-center bg-emerald-50 border-emerald-200 text-emerald-700";
                }

                document.getElementById('scoreDisplay').innerText = res.resilience_score;
                pDisplay.innerText = res.phase + " Phase";
                btn.innerText = "Calculate & Save to DB";
            } catch (e) {
                alert("Error connecting to Railway server.");
                btn.innerText = "Calculate & Save to DB";
            }
        }
    </script>
</body>
</html>
