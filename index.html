<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAO - Live Resilience Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-black text-indigo-600 tracking-tighter">PAO</h1>
            <p class="text-slate-500 text-sm italic mt-2">Live Resilience Calculator</p>
            <p class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-widest">R = θ · D · (αA + βN + γM) · S · O / E</p>
        </header>

        <div class="space-y-5">
            <div>
                <label class="flex justify-between text-xs font-bold text-slate-500 uppercase">
                    <span>⏳ Duration (D)</span>
                    <span id="D_val" class="text-indigo-600">5.0</span>
                </label>
                <input type="range" id="D" min="1" max="10" step="0.5" value="5" oninput="document.getElementById('D_val').innerText=this.value" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>

            <div>
                <label class="flex justify-between text-xs font-bold text-slate-500 uppercase">
                    <span>🧬 Biological (A)</span>
                    <span id="A_val" class="text-indigo-600">5.0</span>
                </label>
                <input type="range" id="A" min="1" max="10" step="0.5" value="5" oninput="document.getElementById('A_val').innerText=this.value" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>

            <div>
                <label class="flex justify-between text-xs font-bold text-slate-500 uppercase">
                    <span>🤝 Social (N)</span>
                    <span id="N_val" class="text-indigo-600">5.0</span>
                </label>
                <input type="range" id="N" min="1" max="10" step="0.5" value="5" oninput="document.getElementById('N_val').innerText=this.value" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>

            <div>
                <label class="flex justify-between text-xs font-bold text-slate-500 uppercase">
                    <span>🧠 Strategic (M)</span>
                    <span id="M_val" class="text-indigo-600">5.0</span>
                </label>
                <input type="range" id="M" min="1" max="10" step="0.5" value="5" oninput="document.getElementById('M_val').innerText=this.value" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>

            <div>
                <label class="flex justify-between text-xs font-bold text-slate-500 uppercase">
                    <span>🛡️ Support (S)</span>
                    <span id="S_val" class="text-indigo-600">5.0</span>
                </label>
                <input type="range" id="S" min="1" max="10" step="0.5" value="5" oninput="document.getElementById('S_val').innerText=this.value" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>

            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">⚡ Effort / Volatility (E)</label>
                <input type="number" id="E" value="5" min="1" class="w-full mt-1 border border-slate-300 p-2 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
                <div class="flex justify-between text-[10px] text-slate-400 mt-1 uppercase"><span>Low (1)</span><span>High (10)</span></div>
            </div>
            
            <button onclick="calculate()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg active:scale-95">
                🚀 Calculate & Save to PAO Database
            </button>
        </div>

        <div id="resultBox" class="mt-8 p-6 rounded-2xl text-center hidden transition-all border shadow-inner">
            <span class="text-xs font-bold uppercase tracking-widest opacity-60">PAO Resilience Score</span>
            <div id="scoreDisplay" class="text-5xl font-black my-1 tracking-tighter">0.00</div>
            <div id="phaseDisplay" class="text-sm font-bold uppercase tracking-tighter italic"></div>
        </div>
    </div>

    <script>
        async function calculate() {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Processing...";
            
            const payload = {
                D: parseFloat(document.getElementById('D').value),
                A: parseFloat(document.getElementById('A').value),
                N: parseFloat(document.getElementById('N').value),
                M: parseFloat(document.getElementById('M').value),
                S: parseFloat(document.getElementById('S').value),
                E: parseFloat(document.getElementById('E').value),
                theta: 1, O: 1 // Baseline constants
            };

            try {
                const response = await fetch('/calculate-resilience', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const res = await response.json();

                const box = document.getElementById('resultBox');
                box.classList.remove('hidden');
                
                if(res.phase === "Foundation") {
                    box.className = "mt-8 p-6 rounded-2xl text-center bg-orange-50 border-orange-200 text-orange-700 shadow-inner";
                } else if(res.phase === "Growth") {
                    box.className = "mt-8 p-6 rounded-2xl text-center bg-blue-50 border-blue-200 text-blue-700 shadow-inner";
                } else {
                    box.className = "mt-8 p-6 rounded-2xl text-center bg-emerald-50 border-emerald-200 text-emerald-700 shadow-inner";
                }

                document.getElementById('scoreDisplay').innerText = res.resilience_score;
                document.getElementById('phaseDisplay').innerText = res.phase + " Phase";
            } catch (e) {
                alert("Connection Error to Railway.");
            } finally {
                btn.innerText = originalText;
            }
        }
    </script>
</body>
</html>
